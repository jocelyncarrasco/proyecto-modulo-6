<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos — Universidad Java</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f4f4f8;">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg" style="background-color: #3a2a6e;">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="/">🎓 Universidad Java</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" style="color: white;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/">🏠 Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/estudiantes">👥 Estudiantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white active" href="/cursos">📚 Cursos</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link text-white dropdown-toggle" href="#"
                           data-bs-toggle="dropdown">
                            👤 <span sec:authentication="name">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <span class="dropdown-item-text text-muted" style="font-size: 12px;">
                                    <span sec:authorize="hasRole('ADMIN')">🛡️ Administrador</span>
                                    <span sec:authorize="hasRole('USER')">🎓 Estudiante</span>
                                </span>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item text-danger">
                                        🚪 Cerrar Sesión
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h2 class="fw-bold mb-1" style="color: #3a2a6e;">📚 Cursos</h2>
                <p style="color: #7060a0;">Listado de cursos disponibles</p>
            </div>
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/cursos/nuevo" class="btn text-white"
                   style="background-color: #3a2a6e; border-radius: 10px;">
                    ➕ Nuevo Curso
                </a>
            </div>
        </div>

        <!-- TARJETAS -->
        <div class="row g-4">
            <div class="col-md-4" th:each="curso : ${cursos}">
                <div class="card h-100 shadow-sm"
                     style="border: 1px solid #c0b0e0; border-radius: 16px; background: #fff;">
                    <div class="card-body p-4">

                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div style="font-size: 40px; line-height: 1;">📖</div>
                            <span class="badge"
                                  style="background: #dbeafe; color: #2563eb; padding: 5px 10px; border-radius: 20px; font-size: 11px;">
                                ⏱️ <span th:text="${curso.duracion}"></span>h
                            </span>
                        </div>

                        <h5 class="fw-bold mb-1" style="color: #3a2a6e;"
                            th:text="${curso.nombre}"></h5>
                        <p class="mb-2" style="color: #7060a0; font-size: 14px;"
                           th:text="${curso.descripcion}"></p>
                        <p class="mb-3" style="font-size: 13px; color: #3a2a6e;">
                            👨‍🏫 <span th:text="${curso.instructor}"></span>
                        </p>

                        <span class="badge mb-3"
                              style="background: #dcfce7; color: #16a34a; padding: 5px 12px; border-radius: 20px; font-size: 11px;">
                            ✅ DISPONIBLE
                        </span>

                        <div sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}"
                               class="btn btn-sm w-100 mt-2"
                               style="border: 1px solid #e84040; color: #e84040; border-radius: 8px;"
                               onclick="return confirm('¿Eliminar este curso?')">
                                🗑️ Eliminar
                            </a>
                        </div>

                    </div>
                </div>
            </div>

            <div class="col-12" th:if="${#lists.isEmpty(cursos)}">
                <div class="text-center py-5" style="color: #7060a0;">
                    <div style="font-size: 64px;">📭</div>
                    <p class="mt-3">No hay cursos registrados</p>
                </div>
            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer class="text-center py-3 mt-5"
            style="background-color: #3a2a6e; border-top: 3px solid #8060d0;">
        <p class="mb-0 text-white">🎓 Universidad Java &copy; 2026 — SpringEduManager</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Estudiante — Universidad Java</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f8; font-family: sans-serif; }

        .emoji-icon {
            font-size: 52px;
            display: inline-block;
            transition: transform 0.3s ease;
            cursor: default;
        }
        .emoji-icon:hover { transform: scale(1.2) rotate(-5deg); }

        .card {
            border: 1px solid #c0b0e0;
            border-radius: 16px;
            background: #fff;
            transition: box-shadow 0.3s ease;
        }
        .card:hover { box-shadow: 0 8px 24px rgba(58,42,110,0.15); }

        .form-control, .form-select {
            border: 1px solid #c0b0e0;
            border-radius: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3a2a6e;
            box-shadow: 0 0 0 3px rgba(58,42,110,0.1);
        }

        .btn-guardar {
            background-color: #3a2a6e;
            color: white;
            border-radius: 10px;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(58,42,110,0.3);
            color: white;
        }

        .btn-cancelar {
            border: 1px solid #c0b0e0;
            color: #7060a0;
            border-radius: 10px;
            background: transparent;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-cancelar:hover {
            transform: translateY(-2px);
            background: #f4f4f8;
            color: #3a2a6e;
        }

        .field-icon {
            font-size: 18px;
            transition: transform 0.3s;
        }
        .form-group:hover .field-icon { transform: scale(1.3); }

        .badge-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg" style="background-color: #3a2a6e;">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="/">🎓 Universidad Java</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" style="color: white;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="/">🏠 Inicio</a></li>
                    <li class="nav-item"><a class="nav-link text-white active" href="/estudiantes">👥 Estudiantes</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/cursos">📚 Cursos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="mb-4">
                    <a href="/estudiantes" class="text-decoration-none mb-3 d-inline-block"
                       style="color: #7060a0;">← Volver a Estudiantes</a>
                    <div class="text-center mb-3">
                        <span class="emoji-icon">🎓</span>
                    </div>
                    <h2 class="fw-bold text-center" style="color: #3a2a6e;">Nuevo Estudiante</h2>
                    <p class="text-center" style="color: #7060a0;">Completa los datos del estudiante</p>
                    <div class="text-center">
                        <span class="badge-tag" style="background: #dcfce7; color: #16a34a;">✅ REGISTRO</span>
                    </div>
                </div>

                <div class="card shadow-sm p-4">
                    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3 form-group">
                            <label class="form-label fw-bold" style="color: #3a2a6e;">
                                <span class="field-icon">👤</span> Nombre
                            </label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: Juan" required>
                        </div>

                        <div class="mb-3 form-group">
                            <label class="form-label fw-bold" style="color: #3a2a6e;">
                                <span class="field-icon">👤</span> Apellido
                            </label>
                            <input type="text" class="form-control" th:field="*{apellido}"
                                   placeholder="Ej: Pérez" required>
                        </div>

                        <div class="mb-3 form-group">
                            <label class="form-label fw-bold" style="color: #3a2a6e;">
                                <span class="field-icon">📧</span> Email
                            </label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   placeholder="Ej: juan@universidad.java" required>
                        </div>

                        <div class="mb-4 form-group">
                            <label class="form-label fw-bold" style="color: #3a2a6e;">
                                <span class="field-icon">📖</span> Carrera
                            </label>
                            <input type="hidden" id="carreraHidden" name="carrera" value="">
                            <select class="form-select" id="carreraSelect"
                                    onchange="toggleCarreraCustom(this)">
                                <option value="">Selecciona una carrera...</option>
                                <option value="Ingeniería en Sistemas">⚙️ Ingeniería en Sistemas</option>
                                <option value="Desarrollo Web">🌐 Desarrollo Web</option>
                                <option value="Base de Datos">🗄️ Base de Datos</option>
                                <option value="Spring Boot">🍃 Spring Boot</option>
                                <option value="Ciencias de la Computación">💻 Ciencias de la Computación</option>
                                <option value="Inteligencia Artificial">🤖 Inteligencia Artificial</option>
                                <option value="otra">✏️ Otra carrera...</option>
                            </select>
                            <input type="text" id="carreraCustom" class="form-control mt-2"
                                   placeholder="Escribe el nombre de la carrera"
                                   style="display: none;"
                                   oninput="actualizarCarrera(this.value)">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-guardar flex-fill py-2">
                                💾 Guardar Estudiante
                            </button>
                            <a href="/estudiantes" class="btn btn-cancelar flex-fill py-2 text-center">
                                ❌ Cancelar
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-center py-3 mt-5"
            style="background-color: #3a2a6e; border-top: 3px solid #8060d0;">
        <p class="mb-0 text-white">🎓 Universidad Java &copy; 2026 — SpringEduManager</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleCarreraCustom(select) {
            const custom = document.getElementById('carreraCustom');
            const hidden = document.getElementById('carreraHidden');
            if (select.value === 'otra') {
                custom.style.display = 'block';
                custom.required = true;
                hidden.value = '';
            } else {
                custom.style.display = 'none';
                custom.required = false;
                hidden.value = select.value;
            }
        }

        function actualizarCarrera(valor) {
            document.getElementById('carreraHidden').value = valor;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('carreraSelect');
            const hidden = document.getElementById('carreraHidden');
            hidden.value = select.value;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Universidad Java</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f8; font-family: sans-serif; }

        .emoji-logo {
            font-size: 72px;
            display: inline-block;
            transition: transform 0.3s ease;
            cursor: default;
        }
        .emoji-logo:hover { transform: scale(1.2) rotate(-10deg); }

        .card {
            border: 1px solid #c0b0e0;
            border-radius: 16px;
            background: #fff;
            transition: box-shadow 0.3s ease;
        }
        .card:hover { box-shadow: 0 8px 24px rgba(58,42,110,0.15); }

        .form-control {
            border: 1px solid #c0b0e0;
            border-radius: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus {
            border-color: #3a2a6e;
            box-shadow: 0 0 0 3px rgba(58,42,110,0.1);
        }

        .btn-login {
            background-color: #3a2a6e;
            color: white;
            border-radius: 10px;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(58,42,110,0.35);
            color: white;
        }
        .btn-login:active { transform: translateY(0px); }

        .badge-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">

                <div class="text-center mb-4">
                    <span class="emoji-logo">🎓</span>
                    <h2 class="fw-bold mt-2" style="color: #3a2a6e;">Universidad Java</h2>
                    <p style="color: #7060a0;">SpringEduManager</p>
                    <span class="badge-tag" style="background: #f3e8ff; color: #9333ea;">
                        🔐 ACCESO SEGURO
                    </span>
                </div>

                <div class="card shadow-sm p-4">

                    <h5 class="fw-bold mb-4 text-center" style="color: #3a2a6e;">
                        🔑 Iniciar Sesion
                    </h5>

                    <div th:if="${param.error}" class="alert alert-danger">
                        ❌ Usuario o contrasena incorrectos
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success">
                        ✅ Sesion cerrada correctamente
                    </div>

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: #3a2a6e;">
                                👤 Usuario
                            </label>
                            <input type="text" class="form-control" name="username"
                                   placeholder="Ej: admin" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold" style="color: #3a2a6e;">
                                🔒 Contrasena
                            </label>
                            <input type="password" class="form-control" name="password"
                                   placeholder="Ingresa tu contrasena" required>
                        </div>

                        <button type="submit" class="btn btn-login w-100 py-2 fw-bold">
                            🚀 Ingresar
                        </button>

                    </form>

                    <div class="mt-4 p-3 rounded" style="background: #f4f4f8; border: 1px solid #c0b0e0;">
                        <p class="fw-bold mb-2" style="color: #3a2a6e; font-size: 13px;">
                            ℹ️ Usuarios de prueba:
                        </p>
                        <p class="mb-1" style="font-size: 12px; color: #7060a0;">
                            🛡️ <strong>Admin:</strong> admin / admin123
                        </p>
                        <p class="mb-0" style="font-size: 12px; color: #7060a0;">
                            🎓 <strong>Estudiante:</strong> estudiante / est123
                        </p>
                    </div>

                </div>

                <p class="text-center mt-3" style="color: #7060a0; font-size: 12px;">
                    🎓 Universidad Java &copy; 2026 — SpringEduManager
                </p>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
